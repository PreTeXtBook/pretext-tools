name: Publish Latex-Pretext Package

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Release level"
        required: true
        type: choice
        default: "patch"
        options:
          - "patch"
          - "minor"
          - "major"
      update_internal_deps:
        description: "Update internal monorepo dependency versions"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Dependencies
        run: npm install

      - name: Update internal monorepo dependency versions
        if: ${{ inputs.update_internal_deps }}
        run: node ./scripts/update-internal-deps.mjs

      - name: Bump Version
        run: |
          cd packages/latex-pretext
          npm version ${{ inputs.level }} --no-git-tag-version
          cd ../..

      - name: Get Version
        id: version
        run: echo "VERSION=$(jq -r '.version' packages/latex-pretext/package.json)" >> $GITHUB_OUTPUT

      - name: Build Package
        run: npm run build -w @pretextbook/latex-pretext

      - name: Publish to npm
        run: |
          cd packages/latex-pretext
          npm publish --provenance

      - name: Commit and Push
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add packages/*/package.json package-lock.json
          git commit -m "chore(latex-pretext): bump to v${{ steps.version.outputs.VERSION }}"
          git push origin main

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "latex-pretext-v${{ steps.version.outputs.VERSION }}" \
            --repo="$GITHUB_REPOSITORY" \
            --title="Latex-Pretext Package v${{ steps.version.outputs.VERSION }}"
