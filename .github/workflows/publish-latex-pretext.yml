name: Publish Latex-Pretext Package

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Release level"
        required: true
        type: choice
        default: "patch"
        options:
          - "patch"
          - "minor"
          - "major"
      unified_latex_fork:
        description: "Fork repo in owner/name form"
        required: true
        type: string
        default: "pretextplus/unified-latex"
      unified_latex_ref:
        description: "Branch, tag, or SHA from the fork"
        required: true
        type: string
        default: "main"

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: npm install

      - name: Checkout unified-latex fork
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.unified_latex_fork }}
          ref: ${{ inputs.unified_latex_ref }}
          path: tmp/unified-latex-fork

      - name: Build and Install unified-latex from fork
        run: node ./scripts/install-unified-latex-from-source.cjs ./tmp/unified-latex-fork

      - name: Build Package
        run: npm exec nx build @pretextbook/latex-pretext

      - name: Bump Version
        run: |
          cd packages/latex-pretext
          npm version ${{ inputs.level }}
          cd ../..

      - name: Get Version
        id: version
        run: echo "VERSION=$(jq -r '.version' packages/latex-pretext/package.json)" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: |
          cd packages/latex-pretext
          npm publish --provenance

      - name: Commit and Push
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add packages/latex-pretext/package.json
          git commit -m "chore(latex-pretext): bump to v${{ steps.version.outputs.VERSION }}"
          git push origin main

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "latex-pretext-v${{ steps.version.outputs.VERSION }}" \
            --repo="$GITHUB_REPOSITORY" \
            --title="Latex-Pretext Package v${{ steps.version.outputs.VERSION }}"
