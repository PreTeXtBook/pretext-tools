<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PreTeXt Formatter</title>
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      .compare-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr;
        height: calc(100vh - var(--toolbar-h));
        gap: 0;
      }
      .input-col {
        grid-row: 1 / 3;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--overlay);
      }
      .controls-row {
        background: var(--surface);
        border-bottom: 1px solid var(--overlay);
        padding: 8px 12px;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .output-pane {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .pane-header {
        background: var(--surface);
        border-bottom: 1px solid var(--overlay);
        padding: 0 12px;
        height: var(--pane-hdr);
        display: flex;
        align-items: center;
        font-size: 12px;
        font-weight: 600;
        color: var(--subtext);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        gap: 8px;
      }
      .output-pre {
        flex: 1;
        overflow: auto;
        padding: 12px;
        margin: 0;
        font-size: 13px;
        line-height: 1.6;
        white-space: pre;
        background: var(--bg);
        color: var(--text);
      }
      .control-group {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--subtext);
      }
      .control-group label {
        white-space: nowrap;
      }
      .control-group select,
      .control-group input[type='number'] {
        background: var(--overlay);
        color: var(--text);
        border: 1px solid var(--muted);
        border-radius: 4px;
        padding: 2px 6px;
        font-family: inherit;
        font-size: 12px;
      }
      .control-group input[type='checkbox'] {
        accent-color: var(--accent);
      }
      .input-col textarea {
        flex: 1;
        resize: none;
        background: var(--bg);
        color: var(--text);
        border: none;
        padding: 12px;
        font-family: inherit;
        font-size: 13px;
        line-height: 1.6;
        outline: none;
        tab-size: 2;
      }
    </style>
  </head>
  <body>
    <header class="toolbar">
      <span class="logo">⊕ PreTeXt Formatter</span>
      <a href="/" class="page-link">← Playground</a>
    </header>

    <div class="compare-layout">
      <div class="input-col">
        <div class="pane-header">
          <span>PreTeXt XML Input</span>
        </div>
        <textarea id="input" spellcheck="false" autocomplete="off"></textarea>
      </div>

      <div class="output-pane">
        <div class="controls-row">
          <div class="control-group">
            <label for="blankLines">Blank lines:</label>
            <select id="blankLines">
              <option value="few">few</option>
              <option value="some" selected>some</option>
              <option value="many">many</option>
            </select>
          </div>
          <div class="control-group">
            <label for="printWidth">Print width:</label>
            <input
              id="printWidth"
              type="number"
              value="80"
              min="0"
              max="200"
              style="width: 60px"
            />
          </div>
          <div class="control-group">
            <label for="tabSize">Tab size:</label>
            <input
              id="tabSize"
              type="number"
              value="2"
              min="1"
              max="8"
              style="width: 50px"
            />
          </div>
          <div class="control-group">
            <label><input id="useTabs" type="checkbox" /> Tabs</label>
          </div>
          <div class="control-group">
            <label
              ><input id="breakSentences" type="checkbox" /> Break
              sentences</label
            >
          </div>
        </div>
        <pre id="output" class="output-pre"></pre>
      </div>
    </div>

    <script type="module" src="/src/format-compare.ts"></script>
  </body>
</html>
